<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LAS 근무관리시스템</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Noto Sans KR', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
        }
        
        .left-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        
        .science-image {
            max-width: 500px;
            width: 100%;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .image-caption {
            text-align: center;
            color: white;
            font-size: 28px;
            font-weight: bold;
            margin-top: 30px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .right-panel {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        
        .dashboard-container {
            background: white;
            padding: 60px 40px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            text-align: center;
        }
        
        .logo {
            margin-bottom: 30px;
        }
        
        .logo-icon {
            width: 80px;
            height: 80px;
            margin: 0 auto 20px;
        }
        
        .logo h1 {
            color: #16a085;
            font-size: 36px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .logo p {
            color: #16a085;
            font-size: 14px;
        }
        
        .user-info {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin: 30px 0;
        }
        
        .info-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            padding-bottom: 15px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .info-item:last-child {
            margin-bottom: 0;
            padding-bottom: 0;
            border-bottom: none;
        }
        
        .info-label {
            color: #2c3e50;
            font-weight: 600;
            font-size: 14px;
        }
        
        .info-value {
            color: #16a085;
            font-weight: 500;
            font-size: 14px;
        }
        
        .button-group {
            display: flex;
            gap: 15px;
            margin-top: 30px;
        }
        
        .btn {
            flex: 1;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background-color: #16a085;
            color: white;
        }
        
        .btn-primary:hover {
            background-color: #138d75;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(22, 160, 133, 0.4);
        }
        
        .btn-secondary {
            background-color: #16a085;
            color: white;
        }
        
        .btn-secondary:hover {
            background-color: #138d75;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(22, 160, 133, 0.4);
        }
        
        .btn-logout {
            width: 100%;
            padding: 12px;
            margin-top: 15px;
            background-color: white;
            color: #e74c3c;
            border: 2px solid #e74c3c;
            border-radius: 10px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn-logout:hover {
            background-color: #e74c3c;
            color: white;
        }

        .admin-badge {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            margin-left: 10px;
        }

        @media (max-width: 1024px) {
            body {
                flex-direction: column;
            }
            
            .left-panel, .right-panel {
                flex: none;
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="left-panel">
        <div>
            <img src="https://images.unsplash.com/photo-1576086213369-97a306d36557?w=800" 
                 alt="The Rise of Life Forms with a Nucleus" 
                 class="science-image">
            <div class="image-caption">The Rise of Life Forms with a Nucleus</div>
        </div>
    </div>
    
    <div class="right-panel">
        <div class="dashboard-container">
            <div class="logo">
                <svg class="logo-icon" viewBox="0 0 100 100">
                    <path fill="#16a085" d="M20,30 L50,20 L80,30 L80,70 L50,80 L20,70 Z M30,40 L50,35 L70,40 L70,60 L50,65 L30,60 Z"/>
                    <path fill="#1abc9c" d="M30,40 L50,35 L70,40 L70,50 L50,55 L30,50 Z"/>
                </svg>
                <h1>LAS 근무관리시스템</h1>
                <p>LAS 매장관리 시스템에 오신것을 환영합니다.</p>
            </div>

            <div class="user-info">
                <div class="info-item">
                    <span class="info-label">🏢 지점명</span>
                    <span class="info-value" id="userBranch">-</span>
                </div>
                <div class="info-item">
                    <span class="info-label">👤 이름</span>
                    <span class="info-value" id="userName">
                        <span id="userNameText">-</span>
                        <span id="adminBadge" class="admin-badge" style="display: none;">관리자</span>
                    </span>
                </div>
                <div class="info-item">
                    <span class="info-label">📋 구분</span>
                    <span class="info-value" id="userType">-</span>
                </div>
            </div>

            <div class="button-group">
                <button class="btn btn-primary" onclick="goToWorkDiary()">근무일지</button>
                <button class="btn btn-secondary" onclick="goToSales()">판매관리</button>
            </div>

            <button class="btn-logout" onclick="logout()">나가기</button>
        </div>
    </div>

    <script>
        // 현재 로그인 사용자 정보 가져오기
        function getCurrentUser() {
            const userStr = sessionStorage.getItem('las_current_user');
            if (!userStr) {
                alert('로그인이 필요합니다.');
                location.href = 'login.html';
                return null;
            }
            return JSON.parse(userStr);
        }

        // 페이지 로드 시 사용자 정보 표시
        window.addEventListener('load', function() {
            const user = getCurrentUser();
            if (!user) return;

            document.getElementById('userBranch').textContent = user.branch;
            document.getElementById('userNameText').textContent = user.name;
            document.getElementById('userType').textContent = user.userType;

            // 관리자인 경우 배지 표시
            if (user.userType === '관리자') {
                document.getElementById('adminBadge').style.display = 'inline-block';
            }
        });

        function goToWorkDiary() {
            location.href = 'work-diary.html';
        }

        function goToSales() {
            location.href = 'sales.html';
        }

        function logout() {
            if (confirm('로그아웃 하시겠습니까?')) {
                sessionStorage.removeItem('las_current_user');
                alert('로그아웃 되었습니다.');
                location.href = 'login.html';
            }
        }
    </script>
</body>
</html>
